<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-login.css">
    <title>Rolex</title>
</head>
<body>
    
 <header>
        <div class="header-wrapper">
            <div class="navigation">
                <nav>
                    <a href="home.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </nav>
            </div>

            <div class="logo">
                <img src="img/icon.png" alt="Rolex ikonica">
            </div>

            <div class="header-search">
                <div class="header-search-input">
                    <input type="text" placeholder="Search...">
                </div>

                <div class="header-shopping-images">
                    <a href="shop.html">
                        <img src="img/shopping-logo.png" alt="Korpa">
                    </a>

                    <a href="login.html">
                        <img src="img/user-logo.png" alt="Login ikonica">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <div class="login-layout">
        <div class="login-page">
            <h2>Login</h2>

            <div class="login-infos">
                <p>Email</p>
                <input type="email" placeholder="Enter your email...">
            </div>

            <div class="login-infos">
                <p>Password</p>
                <input type="password" placeholder="Enter your password...">
            </div>

            <div class="login-options">
                <label>
                    <span><input type="checkbox"> Remember me</span>
                </label>
                <p>Forgot-password</p>
            </div>

            <button class="login-btn">LOGIN</button>
            <p class="create-acc">
                Or <a href="login.html">Create an Account</a>
            </p>
        </div>
    </div>

    <footer>
        <div class="footer-wrapper">
            <div class="footer-infos">
                <h3>Rolex</h3>
                <p>Official Retailer</p>
            </div>

            <div class="footer-infos second-div">
                <h3>Information</h3>
                <p>Privacy Policy</p>
                <p>Terms & Conditions</p>
            </div>

            <div class="footer-infos">
                <h3>Support</h3>
                <p>Contact</p>
                <p>FAQ</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
