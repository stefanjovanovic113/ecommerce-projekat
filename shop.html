<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-shop.css">
    <title>Rolex-Shop</title>
</head>
<body>
    
    <header>
        <div class="header-wrapper">
            <div class="navigation">
                <nav>
                    <a href="home.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </nav>
            </div>

            <div class="logo">
                <img src="img/icon.png" alt="Rolex ikonica">
            </div>

            <div class="header-search">
                <div class="header-search-input">
                    <input type="text" placeholder="Search...">
                </div>

                <div class="header-shopping-images">
                    <a href="shop.html">
                        <img src="img/shopping-logo.png" alt="Korpa">
                    </a>

                    <a href="login.html">
                        <img src="img/user-logo.png" alt="Login ikonica">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="checkout-page">
        <h1 class="checkout-title">Checkout</h1>

        <div class="checkout-layout">
            <div class="checkout-1">
                <section class="box">
                    <h3>Shipping Information</h3>
                    <div class="row">
                        <input type="text" placeholder="First Name">
                        <input type="text" placeholder="Last Name">
                    </div>

                    <input type="text" placeholder="Adress">

                    <div class="row">
                        <select>
                            <option value="">Country</option>
                            <option value="RS">Serbia</option>
                            <option value="DE">Germany</option>
                            <option value="FR">France</option>
                            <option value="IT">Italy</option>
                            <option value="CH">Switzerland</option>
                            <option value="US">United States</option>
                        </select>
                        <select>
                            <option value="">City</option>
                            <option value="Belgrade">Belgrade</option>
                            <option value="Novi Sad">Novi Sad</option>
                            <option value="Niš">Niš</option>
                            <option value="Zurich">Zurich</option>
                            <option value="Geneva">Geneva</option>
                            <option value="Paris">Paris</option>
                            <option value="Munich">Munich</option>
                            <option value="Milan">Milan</option>
                            <option value="New York">New York</option>
                        </select>
                        <select>
                            <option value="">Zipcode</option>
                            <option value="11000">11000</option>
                            <option value="21000">21000</option>
                            <option value="18000">18000</option>
                            <option value="8000">8000</option>
                            <option value="1200">1200</option>
                            <option value="75000">75000</option>
                            <option value="80331">80331</option>
                            <option value="20121">20121</option>
                            <option value="10001">10001</option>
                        </select>
                    </div>

                    <label class="checkbox">
                        <input type="checkbox">
                        <span>Save contact information</span>
                    </label>
                </section>

                <section class="box">
                    <h3>Payment Information</h3>
                    <div class="buttons">
                        <button class="btn-active">PayPal</button>
                        <button>Cash</button>
                    </div>
                    <input type="text" placeholder="Cardholder Name">
                    <input type="number" placeholder="Card Number">

                    <div class="row">
                        <select>
                            <option value="">Month</option>
                            <option value="01">01</option>
                            <option value="02">02</option>
                            <option value="03">03</option>
                            <option value="04">04</option>
                            <option value="05">05</option>
                            <option value="06">06</option>
                            <option value="07">07</option>
                            <option value="08">08</option>
                            <option value="09">09</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                        </select>
                        <select>
                            <option value="">Year</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                            <option value="2031">2031</option>
                            <option value="2032">2032</option>
                            <option value="2033">2033</option>
                            <option value="2034">2034</option>
                            <option value="2035">2035</option>
                        </select>
                    <input type="text" placeholder="CVC">
                </div>

                <button class="pay-btn">Pay</button>
                </section>
            </div>

            <aside class="checkout-2">
                <h3>Review your Cart</h3>

                <div class="cart-items">
                    <img src="img/daytona.png" alt="Rolex Daytona">
                    <div>
                        <p>Daytona</p>
                    </div>
                    <span>$8,600</span>
                </div>

                <div class="cart-items">
                    <img src="img/6.png" alt="Rolex Yacht-Master">
                    <div>
                        <p>Yacht-Master</p>
                    </div>
                    <span>$12,400</span>
                </div>

                <div class="cart-items">
                    <img src="img/5.png" alt="Rolex Explorer">
                    <div>
                        <p>Explorer</p>
                    </div>
                    <span>$7,250</span>
                </div>

                <div class="cart-items">
                    <img src="img/4.png" alt="Rolex GMT-Master">
                    <div>
                        <p>GMT-Master II</p>
                    </div>
                    <span>$11,000</span>
                </div>

                <div class="total">
                    <p>Total</p>
                    <p>$39,250</p>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <div class="footer-wrapper">
            <div class="footer-infos">
                <h3>Rolex</h3>
                <p>Official Retailer</p>
            </div>

            <div class="footer-infos second-div">
                <h3>Information</h3>
                <p>Privacy Policy</p>
                <p>Terms & Conditions</p>
            </div>

            <div class="footer-infos">
                <h3>Support</h3>
                <p>Contact</p>
                <p>FAQ</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
